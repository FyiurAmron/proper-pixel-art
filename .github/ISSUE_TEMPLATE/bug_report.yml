name: Bug report
description: Report a problem or a poor result
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What went wrong, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: >-
        The exact command or Python code you ran, if applicable.
      placeholder: ppa input.png -c 16 -s 5
    validations:
      required: false
  - type: textarea
    id: input-image
    attributes:
      label: Input image
      description: >-
        If this is about a poor result, please attach the input image
        (drag and drop it here). Tip: try a few values of `num_colors`
        first (e.g. 8/16/32/64, or 0 to skip quantization).
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `ppa --version`, or the commit if installed from source.
      placeholder: proper-pixel-art x.y.z
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and Python version, if relevant.
      placeholder: Windows 11, Python 3.12
    validations:
      required: false
